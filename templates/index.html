<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English → Telugu Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-en">EN</span>
        <span class="arrow">⇌</span>
        <span class="logo-te">తె</span>
      </div>
      <h1>English → Telugu Translator</h1>
      <p class="subtitle">Powered by Helsinki-NLP MarianMT Transformer</p>
    </header>

    <main>
      <div class="translator-card">
        <div class="panel left-panel">
          <div class="panel-header">
            <span class="lang-badge en-badge">English</span>
            <button class="btn-icon" id="clearBtn" title="Clear">✕</button>
          </div>
          <textarea
            id="inputText"
            placeholder="Type or paste English text here..."
            maxlength="1000"
          ></textarea>
          <div class="panel-footer">
            <span class="char-count"><span id="charCount">0</span>/1000</span>
            <button class="translate-btn" id="translateBtn">
              <span id="btnText">Translate</span>
              <span id="btnSpinner" class="spinner hidden"></span>
            </button>
          </div>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="swap-icon">⇄</div>
          <div class="divider-line"></div>
        </div>

        <div class="panel right-panel">
          <div class="panel-header">
            <span class="lang-badge te-badge">తెలుగు</span>
            <button class="btn-icon" id="copyBtn" title="Copy translation">⧉</button>
          </div>
          <div class="output-area" id="outputArea">
            <span class="placeholder-text">Translation will appear here...</span>
          </div>
          <div class="panel-footer">
            <span id="copyMsg" class="copy-msg hidden">✓ Copied!</span>
          </div>
        </div>
      </div>

      <div id="errorBox" class="error-box hidden"></div>

      <div class="examples">
        <p class="examples-label">Try an example:</p>
        <div class="example-chips">
          <button class="chip" data-text="Good morning, how are you?">Good morning, how are you?</button>
          <button class="chip" data-text="What is your name?">What is your name?</button>
          <button class="chip" data-text="I love learning new languages.">I love learning new languages.</button>
          <button class="chip" data-text="The weather is very pleasant today.">The weather is very pleasant today.</button>
        </div>
      </div>
    </main>

    <footer>
      <p>Built with <span class="heart">♥</span> using FastAPI + Hugging Face Transformers</p>
    </footer>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
